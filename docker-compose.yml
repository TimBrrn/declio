version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///data/declio.db
    volumes:
      - db-data:/app/data
      - logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  logs:
